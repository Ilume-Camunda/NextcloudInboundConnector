spring.main.allow-bean-definition-overriding=true

server.port=9898

camunda.client.mode=selfmanaged
camunda.client.auth.username=demo
camunda.client.auth.password=demo
camunda.client.grpc-address=http://localhost:26500
camunda.client.rest-address=http://localhost:8080

# Camunda Connector
camunda.connector.secret-provider.console.enabled=false
camunda.connector.secret-provider.environment.enabled=true
camunda.connector.secret-provider.environment.prefix=SECRETS_
camunda.connector.polling.enabled=true

# Whitelist
nextcloud.path.whitelist=/Photos,/invoices,/documents
